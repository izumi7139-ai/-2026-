name: Nikkei225 Two Step LINE Notify

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest

    env:
      NOTIFY_MODE: MORNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run Market Radar
        run: python main.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NOTIFY_MODE: MORNING
