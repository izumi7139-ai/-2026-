name: J-TENBAGGER Weekly LINE Notify

on:
  schedule:
    - cron: "30 22 * * 0"   # 日本時間 月曜 7:30
  workflow_dispatch:

jobs:
  j-tenbagger:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run J-TENBAGGER
        run: python main.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
